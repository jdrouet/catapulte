[package]
name = "catapulte"
version = "1.0.0"
description = """Catapulte is an open source mailer you can host yourself.
You can use it to quickly catapult your transactionnal emails to destination."""
authors = ["Jérémie Drouet <jeremie.drouet@gmail.com>"]
edition = "2024"
license = "AGPL-3.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[workspace]
members = [
  "./crates/catapulte-adapter-http",
  "./crates/catapulte-adapter-smtp",
  "./crates/catapulte-adapter-template",
  "./crates/catapulte-domain",
]
resolver = "2"

[workspace.dependencies]
anyhow = { version = "1.0" }
catapulte-adapter-http = { path = "./crates/catapulte-adapter-http", version = "0.1" }
catapulte-adapter-smtp = { path = "./crates/catapulte-adapter-smtp", version = "0.1" }
catapulte-adapter-template = { path = "./crates/catapulte-adapter-template", version = "0.1" }
catapulte-domain = { path = "./crates/catapulte-domain", version = "0.1" }
lettre = { version = "0.11", default-features = false }
metrics = { version = "0.24" }
reqwest = { version = "0.12", default-features = false }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false }
thiserror = { version = "2.0" }
tokio = { version = "1.37", default-features = false }
tracing = { version = "0.1" }
url = { version = "2.5", default-features = false }

[dependencies]
catapulte-adapter-http = { workspace = true }
catapulte-adapter-smtp = { workspace = true }
catapulte-adapter-template = { workspace = true }
catapulte-domain = { workspace = true }

clap = { version = "4.5", features = ["derive", "env"] }
config = { version = "0.15", default-features = false, features = ["toml"] }
serde = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
utoipa = { version = "5.3" }

[dev-dependencies]
axum = { version = "0.8" }
catapulte-adapter-http = { workspace = true }
catapulte-adapter-smtp = { workspace = true }
catapulte-adapter-template = { workspace = true }
catapulte-domain = { workspace = true }
reqwest = { workspace = true, default-features = false, features = [
  "json",
  "rustls-tls",
] }
serde_json = { workspace = true, features = ["std"] }
testcontainers = { version = "0.24" }
tower = { version = "0.5" }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
