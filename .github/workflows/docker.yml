name: docker

on:
  push:
    branches: [nextgen]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # github.repository is "jdrouet/catapulte" (already lowercase, as GHCR requires).
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: build and push
    runs-on: ubuntu-latest
    # Generous: the linux/arm64 build runs under QEMU emulation, which is slow
    # for a Rust release compile. GHA layer caching keeps steady-state pushes
    # fast; a cold cache or a dependency change triggers a slow emulated rebuild
    # of the whole tree, so the ceiling is high.
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
