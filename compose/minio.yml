services:
  catapulte:
    build:
      context: ..
    ports:
      - "3000:3000"
    environment:
      - "CATAPULTE_HTTP_ADDRESS=0.0.0.0:3000"
      - "CATAPULTE_STORAGE_BACKEND=sqlite"
      - "CATAPULTE_SQLITE_URL=:memory:"
      - "CATAPULTE_QUEUE_BACKEND=storage"
      - "CATAPULTE_SENDERS=mailpit"
      - "CATAPULTE_SENDER_MAILPIT_HOST=mailpit"
      - "CATAPULTE_SENDER_MAILPIT_PORT=1025"
      - "CATAPULTE_SENDER_MAILPIT_TLS=none"
      - "CATAPULTE_ATTACHMENT_BACKEND=s3"
      - "CATAPULTE_ATTACHMENT_S3_ENDPOINT=http://minio:9000"
      - "CATAPULTE_ATTACHMENT_S3_REGION=us-east-1"
      - "CATAPULTE_ATTACHMENT_S3_BUCKET=catapulte"
      - "CATAPULTE_ATTACHMENT_S3_ACCESS_KEY_ID=catapulte"
      - "CATAPULTE_ATTACHMENT_S3_SECRET_ACCESS_KEY=catapulte"
      - "CATAPULTE_ATTACHMENT_S3_PATH_STYLE=true"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      - "MINIO_ROOT_USER=catapulte"
      - "MINIO_ROOT_PASSWORD=catapulte"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 catapulte catapulte &&
        mc mb --ignore-existing local/catapulte
      "
    depends_on:
      minio:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP

volumes:
  minio_data:
