# Prometheus scrape config for the Catapulte observability example.
# Scrapes the OpenTelemetry Collector's Prometheus exposition endpoint, which
# carries both Catapulte's gauges and the spanmetrics-derived RED metrics.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otelcol:8889"]
